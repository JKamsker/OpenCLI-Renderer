<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InSpectreUI</title>
    <meta
      name="description"
      content="Inspect OpenCLI snapshots with a deliberate, bundle-friendly React viewer."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        var s = localStorage.getItem("opencli-theme");
        if (s === "dark" || s === "light") document.documentElement.dataset.theme = s;
        else if (matchMedia("(prefers-color-scheme:dark)").matches) document.documentElement.dataset.theme = "dark";
      })();
    </script>
    <script id="inspectre-bootstrap" type="application/json">__INSPECTRE_BOOTSTRAP__</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
