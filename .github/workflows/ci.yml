name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectreUI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectreUI
        run: npm ci

      - name: Test frontend
        working-directory: src/InSpectreUI
        run: npm test

      - name: Build frontend
        working-directory: src/InSpectreUI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OpenCli.Renderer.sln

      - name: Build
        run: dotnet build OpenCli.Renderer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenCli.Renderer.sln --configuration Release --no-build

      - name: Pack tool
        run: dotnet pack src/OpenCli.Renderer/OpenCli.Renderer.csproj --configuration Release --no-build

      - name: Publish tool
        run: dotnet publish src/OpenCli.Renderer/OpenCli.Renderer.csproj --configuration Release --no-build -o artifacts/publish

      - name: Verify published bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/publish/InSpectreUI/dist/index.html
          compgen -G 'artifacts/publish/InSpectreUI/dist/assets/*.css' > /dev/null
          compgen -G 'artifacts/publish/InSpectreUI/dist/assets/*.js' > /dev/null

      - name: Smoke render HTML bundle
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          out_dir="$tmp_dir/opencli-renderer"

          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file html \
            docs/opencli-renderer/opencli.json \
            --xmldoc docs/opencli-renderer/xmldoc.xml \
            --out-dir "$out_dir"

          test -f "$out_dir/index.html"
          grep -q './assets/' "$out_dir/index.html"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            src/OpenCli.Renderer/bin/Release/net10.0/
            src/OpenCli.Renderer/bin/Release/*.nupkg
            artifacts/publish/

  deploy-pages:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectreUI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectreUI
        run: npm ci

      - name: Build frontend
        working-directory: src/InSpectreUI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OpenCli.Renderer.sln

      - name: Build renderer
        run: dotnet build OpenCli.Renderer.sln --configuration Release --no-restore

      - name: Install .NET tool - JDownloader-RemoteCli
        run: dotnet tool install --global JDownloader-RemoteCli

      - name: Install .NET tool - JellyfinCli
        run: dotnet tool install -g JellyfinCli

      - name: Prepare site directory
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          mkdir -p "$site/examples"

          cp docs/index.html "$site/index.html"
          echo "opencli.kamsker.at" > "$site/CNAME"
          touch "$site/.nojekyll"

      - name: Render - OpenCLI Renderer
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file html \
            docs/opencli-renderer/opencli.json \
            --xmldoc docs/opencli-renderer/xmldoc.xml \
            --out-dir _site/examples/opencli-renderer

      - name: Render - Jellyfin CLI
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render exec html jf \
            --with-xmldoc \
            --out-dir _site/examples/jellyfin-cli

      - name: Render - JDownloader RemoteCli
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render exec html jdr \
            --with-xmldoc \
            --out-dir _site/examples/jdownloader-remotecli

      - name: Verify published bundles
        shell: bash
        run: |
          set -euo pipefail

          for example in opencli-renderer jellyfin-cli jdownloader-remotecli; do
            index_path="_site/examples/$example/index.html"
            test -f "$index_path"
            grep -q './assets/' "$index_path"
          done

      - name: Summarize site
        shell: bash
        run: |
          {
            echo "## GitHub Pages site contents"
            echo
            find _site -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: opencli.kamsker.at
