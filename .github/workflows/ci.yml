name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Test frontend
        working-directory: src/InSpectra.UI
        run: npm test

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore InSpectra.Gen.sln

      - name: Build
        run: dotnet build InSpectra.Gen.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InSpectra.Gen.sln --configuration Release --no-build

      - name: Pack tool
        run: dotnet pack src/InSpectra.Gen/InSpectra.Gen.csproj --configuration Release --no-build -p:Version=0.0.${{ github.run_number }}

      - name: Publish tool
        run: dotnet publish src/InSpectra.Gen/InSpectra.Gen.csproj --configuration Release --no-build -o artifacts/publish

      - name: Verify published bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/publish/InSpectra.UI/dist/index.html
          test -f artifacts/publish/InSpectra.UI/dist/static.html
          test -f artifacts/publish/hooks/InSpectra.Gen.StartupHook.dll
          test -f artifacts/publish/hooks/0Harmony.dll
          compgen -G 'artifacts/publish/InSpectra.UI/dist/assets/*.css' > /dev/null
          compgen -G 'artifacts/publish/InSpectra.UI/dist/assets/*.js' > /dev/null

      - name: Smoke render HTML bundle
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"

          # Test multi-file (level 1)
          out1="$tmp_dir/multi"
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html \
            docs/inspectra-gen/opencli.json \
            --xmldoc docs/inspectra-gen/xmldoc.xml \
            --out-dir "$out1" --compression-level 1
          test -f "$out1/index.html"
          test -d "$out1/assets"

          # Test single-file (level 2, default)
          out2="$tmp_dir/single"
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html \
            docs/inspectra-gen/opencli.json \
            --xmldoc docs/inspectra-gen/xmldoc.xml \
            --out-dir "$out2"
          test -f "$out2/index.html"
          [ "$(find "$out2" -type f | wc -l)" -eq 1 ]

      - name: Smoke pure dotnet generate plus render flow
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          opencli="$tmp_dir/opencli.json"
          out="$tmp_dir/dotnet"
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            generate dotnet src/InSpectra.Gen \
            --configuration Release --no-build --with-xmldoc \
            --out "$opencli"
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html "$opencli" \
            --out-dir "$out" --overwrite
          test -f "$out/index.html"

      - name: Smoke generate dotnet mode
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          out="$tmp_dir/opencli.json"
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            generate dotnet src/InSpectra.Gen \
            --configuration Release --no-build \
            --out "$out"
          test -f "$out"

      - name: Validate nupkg
        shell: bash
        run: |
          set -euo pipefail
          nupkg=$(find src/InSpectra.Gen/bin/Release -name '*.nupkg' | head -1)
          test -n "$nupkg"
          echo "Found package: $nupkg"
          dotnet tool install --global --add-source "$(dirname "$nupkg")" InSpectra.Gen --version "0.0.${{ github.run_number }}"
          inspectra --version

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            src/InSpectra.Gen/bin/Release/net10.0/
            artifacts/publish/

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: src/InSpectra.Gen/bin/Release/*.nupkg

  package-pages-preview:
    needs: build-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Prepare site directory
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          mkdir -p "$site"

          # Website: React app IS the landing page (CIGuidePage replaces the
          # old hand-written docs/integrate.html, the docs/CI/ markdown set
          # is the offline-friendly equivalent).
          cp -r src/InSpectra.UI/dist/* "$site/"
          # Remove static bundle template (only used by .NET renderer)
          rm -f "$site/static.html"

          echo "inspectra.kamsker.at" > "$site/CNAME"
          touch "$site/.nojekyll"

          # Backward compat: redirect /try/ to root
          mkdir -p "$site/try"
          echo '<meta http-equiv="refresh" content="0;url=/">' > "$site/try/index.html"

      - name: Verify preview site
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html

      - name: Zip preview site
        shell: bash
        run: |
          set -euo pipefail
          rm -f gh-pages-preview.zip
          (
            cd _site
            zip -r ../gh-pages-preview.zip .
          )

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-preview
          path: gh-pages-preview.zip

  deploy-pages:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Prepare site directory
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          mkdir -p "$site"

          # Website: React app IS the landing page (CIGuidePage replaces the
          # old hand-written docs/integrate.html, the docs/CI/ markdown set
          # is the offline-friendly equivalent).
          cp -r src/InSpectra.UI/dist/* "$site/"
          # Remove static bundle template (only used by .NET renderer)
          rm -f "$site/static.html"

          echo "inspectra.kamsker.at" > "$site/CNAME"
          touch "$site/.nojekyll"

          # Backward compat: redirect /try/ to root
          mkdir -p "$site/try"
          echo '<meta http-equiv="refresh" content="0;url=/">' > "$site/try/index.html"

      - name: Verify published site
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html

      - name: Summarize site
        shell: bash
        run: |
          {
            echo "## GitHub Pages site contents"
            echo
            find _site -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: inspectra.kamsker.at

  sync-v1:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if action files changed
        id: changed
        run: |
          # Compare v1 branch content with main — sync if they differ
          main_action=$(git show HEAD:.github/actions/render/action.yml 2>/dev/null | sha256sum)
          v1_action=$(git show origin/v1:action.yml 2>/dev/null | sha256sum)
          main_workflow=$(git show HEAD:.github/workflows/inspectra-generate.yml 2>/dev/null | sha256sum)
          v1_workflow=$(git show origin/v1:.github/workflows/inspectra-generate.yml 2>/dev/null | sha256sum)
          if [ "$main_action" != "$v1_action" ] || [ "$main_workflow" != "$v1_workflow" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync v1 branch
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create an orphan worktree for v1
          tmp=$(mktemp -d)
          git worktree add --detach "$tmp"
          cd "$tmp"
          git checkout v1

          # Copy action files from main
          cp "$GITHUB_WORKSPACE/.github/actions/render/action.yml" action.yml
          cp "$GITHUB_WORKSPACE/.github/workflows/inspectra-generate.yml" .github/workflows/inspectra-generate.yml

          # Commit and push if anything changed
          git add action.yml .github/workflows/inspectra-generate.yml
          if git diff --cached --quiet; then
            echo "v1 branch already up to date"
          else
            git commit -m "sync action files from main ($(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD))"
            git push origin v1
            echo "v1 branch updated"
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove "$tmp"

  nuget-publish:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nuget-packages

      - name: Get Secrets
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nuget-packages/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json
