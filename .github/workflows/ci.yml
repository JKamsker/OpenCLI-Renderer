name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Test frontend
        working-directory: src/InSpectra.UI
        run: npm test

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore InSpectra.Gen.sln

      - name: Build
        run: dotnet build InSpectra.Gen.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test InSpectra.Gen.sln --configuration Release --no-build

      - name: Pack tool
        run: dotnet pack src/InSpectra.Gen/InSpectra.Gen.csproj --configuration Release --no-build -p:Version=0.0.${{ github.run_number }}

      - name: Publish tool
        run: dotnet publish src/InSpectra.Gen/InSpectra.Gen.csproj --configuration Release --no-build -o artifacts/publish

      - name: Verify published bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/publish/InSpectra.UI/dist/index.html
          compgen -G 'artifacts/publish/InSpectra.UI/dist/assets/*.css' > /dev/null
          compgen -G 'artifacts/publish/InSpectra.UI/dist/assets/*.js' > /dev/null

      - name: Smoke render HTML bundle
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          out_dir="$tmp_dir/inspectra-gen"

          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html \
            docs/inspectra-gen/opencli.json \
            --xmldoc docs/inspectra-gen/xmldoc.xml \
            --out-dir "$out_dir"

          test -f "$out_dir/index.html"
          grep -q './assets/' "$out_dir/index.html"

      - name: Validate nupkg
        shell: bash
        run: |
          set -euo pipefail
          nupkg=$(find src/InSpectra.Gen/bin/Release -name '*.nupkg' | head -1)
          test -n "$nupkg"
          echo "Found package: $nupkg"
          dotnet tool install --global --add-source "$(dirname "$nupkg")" InSpectra.Gen --version "0.0.${{ github.run_number }}"
          inspectra --version

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            src/InSpectra.Gen/bin/Release/net10.0/
            artifacts/publish/

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: src/InSpectra.Gen/bin/Release/*.nupkg

  package-pages-preview:
    needs: build-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore InSpectra.Gen.sln

      - name: Build renderer
        run: dotnet build InSpectra.Gen.sln --configuration Release --no-restore

      - name: Install .NET tool - JDownloader-RemoteCli
        run: dotnet tool install --global JDownloader-RemoteCli

      - name: Install .NET tool - JellyfinCli
        run: dotnet tool install -g JellyfinCli

      - name: Prepare site directory
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          mkdir -p "$site/examples" "$site/try"

          cp docs/index.html "$site/index.html"
          echo "opencli.kamsker.at" > "$site/CNAME"
          touch "$site/.nojekyll"

          cp -r src/InSpectra.UI/dist/* "$site/try/"

      - name: Render - InSpectraGen
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html \
            docs/inspectra-gen/opencli.json \
            --xmldoc docs/inspectra-gen/xmldoc.xml \
            --out-dir _site/examples/inspectra-gen

      - name: Render - Jellyfin CLI
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render exec html jf \
            --with-xmldoc \
            --out-dir _site/examples/jellyfin-cli

      - name: Render - JDownloader RemoteCli
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render exec html jdr \
            --with-xmldoc \
            --out-dir _site/examples/jdownloader-remotecli

      - name: Verify preview bundles
        shell: bash
        run: |
          set -euo pipefail

          for example in inspectra-gen jellyfin-cli jdownloader-remotecli; do
            index_path="_site/examples/$example/index.html"
            test -f "$index_path"
            grep -q './assets/' "$index_path"
          done

          test -f _site/try/index.html

      - name: Zip preview site
        shell: bash
        run: |
          set -euo pipefail
          rm -f gh-pages-preview.zip
          (
            cd _site
            zip -r ../gh-pages-preview.zip .
          )

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-preview
          path: gh-pages-preview.zip

  deploy-pages:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/InSpectra.UI/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/InSpectra.UI
        run: npm ci

      - name: Build frontend
        working-directory: src/InSpectra.UI
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore InSpectra.Gen.sln

      - name: Build renderer
        run: dotnet build InSpectra.Gen.sln --configuration Release --no-restore

      - name: Install .NET tool - JDownloader-RemoteCli
        run: dotnet tool install --global JDownloader-RemoteCli

      - name: Install .NET tool - JellyfinCli
        run: dotnet tool install -g JellyfinCli

      - name: Prepare site directory
        shell: bash
        run: |
          set -euo pipefail
          site="_site"
          mkdir -p "$site/examples" "$site/try"

          cp docs/index.html "$site/index.html"
          echo "opencli.kamsker.at" > "$site/CNAME"
          touch "$site/.nojekyll"

          cp -r src/InSpectra.UI/dist/* "$site/try/"

      - name: Render - InSpectraGen
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render file html \
            docs/inspectra-gen/opencli.json \
            --xmldoc docs/inspectra-gen/xmldoc.xml \
            --out-dir _site/examples/inspectra-gen

      - name: Render - Jellyfin CLI
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render exec html jf \
            --with-xmldoc \
            --out-dir _site/examples/jellyfin-cli

      - name: Render - JDownloader RemoteCli
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project src/InSpectra.Gen --configuration Release --no-build -- \
            render exec html jdr \
            --with-xmldoc \
            --out-dir _site/examples/jdownloader-remotecli

      - name: Verify published bundles
        shell: bash
        run: |
          set -euo pipefail

          for example in inspectra-gen jellyfin-cli jdownloader-remotecli; do
            index_path="_site/examples/$example/index.html"
            test -f "$index_path"
            grep -q './assets/' "$index_path"
          done

          test -f _site/try/index.html

      - name: Summarize site
        shell: bash
        run: |
          {
            echo "## GitHub Pages site contents"
            echo
            find _site -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: opencli.kamsker.at
