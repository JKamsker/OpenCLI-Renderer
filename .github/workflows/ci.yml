name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OpenCli.Renderer.sln

      - name: Build
        run: dotnet build OpenCli.Renderer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OpenCli.Renderer.sln --configuration Release --no-build

      - name: Render docs
        shell: bash
        run: |
          set -euo pipefail

          root="artifacts/rendered-docs"
          mkdir -p \
            "$root/markdown/single" \
            "$root/markdown/tree" \
            "$root/html/single" \
            "$root/html/tree"

          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file markdown assets/testfiles/opencli.json \
            --xmldoc assets/testfiles/xmldoc.xml \
            --out "$root/markdown/single/opencli.md"

          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file markdown assets/testfiles/opencli.json \
            --xmldoc assets/testfiles/xmldoc.xml \
            --layout tree \
            --out-dir "$root/markdown/tree"

          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file html assets/testfiles/opencli.json \
            --xmldoc assets/testfiles/xmldoc.xml \
            --out "$root/html/single/opencli.html"

          dotnet run --project src/OpenCli.Renderer --configuration Release --no-build -- \
            render file html assets/testfiles/opencli.json \
            --xmldoc assets/testfiles/xmldoc.xml \
            --layout tree \
            --out-dir "$root/html/tree"

      - name: Summarize rendered files
        shell: bash
        run: |
          {
            echo "## Rendered artifacts"
            echo
            find artifacts/rendered-docs -type f | sort | sed 's#^#- `#; s#$#`#'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rendered docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: rendered-docs
          path: artifacts/rendered-docs
          if-no-files-found: error
