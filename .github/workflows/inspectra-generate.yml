# ─────────────────────────────────────────────────────────────────────
# InSpectra Generate — reusable workflow
# ─────────────────────────────────────────────────────────────────────
#
# Most users should use the action directly:
#
#   - uses: JKamsker/InSpectra@v1
#     with:
#       cli-name: mycli
#
# This reusable workflow wraps the action with checkout, tool install,
# and artifact upload for convenience.
#
# ─────────────────────────────────────────────────────────────────────

name: InSpectra Generate

on:
  workflow_call:
    inputs:
      # ── render ───────────────────────────────────────────────────
      mode:
        type: string
        default: 'exec'
        description: 'exec (invoke a live CLI) or file (from saved opencli.json)'

      format:
        type: string
        default: 'html'
        description: 'html, markdown (tree), or markdown-monolith (single file)'

      # ── target CLI (exec mode) ──────────────────────────────────
      cli-name:
        type: string
        description: 'CLI executable name or path'

      dotnet-tool:
        type: string
        description: 'NuGet package to `dotnet tool install -g` as the target CLI'

      dotnet-tool-version:
        type: string
        description: 'Version constraint for the dotnet tool'

      setup-command:
        type: string
        description: 'Custom shell command to make the CLI available on PATH'

      opencli-args:
        type: string
        description: 'Override OpenCLI export arguments (default: cli opencli)'

      xmldoc-args:
        type: string
        description: 'Override xmldoc export arguments (default: cli xmldoc)'

      timeout:
        type: string
        description: 'Timeout in seconds for each CLI export command'

      # ── file mode ────────────────────────────────────────────────
      opencli-json:
        type: string
        description: 'Path to opencli.json (file mode)'

      xmldoc:
        type: string
        description: 'Path to xmldoc.xml (file mode)'

      # ── inspectra tool ───────────────────────────────────────────
      inspectra-version:
        type: string
        description: 'InSpectra.Gen NuGet tool version (empty = latest)'

      dotnet-version:
        type: string
        default: '10.0.x'
        description: '.NET SDK version'

      dotnet-quality:
        type: string
        description: '.NET SDK quality channel (empty = stable, or preview)'

      label:
        type: string
        description: 'Custom label shown in the viewer header (e.g. "v1.2.3")'

      extra-args:
        type: string
        description: 'Additional flags forwarded to the inspectra CLI'

      # ── output ───────────────────────────────────────────────────
      artifact-name:
        type: string
        default: 'inspectra-docs'
        description: 'Name of the uploaded artifact'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: ${{ inputs.dotnet-quality }}

      # ── optional: install target CLI from NuGet ─────────────────
      - name: Install target CLI (.NET tool)
        if: inputs.dotnet-tool != ''
        shell: bash
        env:
          TOOL_NAME: ${{ inputs.dotnet-tool }}
          TOOL_VERSION: ${{ inputs.dotnet-tool-version }}
        run: |
          set -euo pipefail
          args=(dotnet tool install -g "$TOOL_NAME")
          if [ -n "$TOOL_VERSION" ]; then
            args+=(--version "$TOOL_VERSION")
          fi
          "${args[@]}"

      # ── optional: custom setup ──────────────────────────────────
      - name: Run custom setup command
        if: inputs.setup-command != ''
        shell: bash
        run: ${{ inputs.setup-command }}

      # ── render ──────────────────────────────────────────────────
      - name: Render with InSpectra
        uses: JKamsker/InSpectra@v1
        with:
          mode: ${{ inputs.mode }}
          format: ${{ inputs.format }}
          cli-name: ${{ inputs.cli-name }}
          label: ${{ inputs.label }}
          opencli-args: ${{ inputs.opencli-args }}
          xmldoc-args: ${{ inputs.xmldoc-args }}
          timeout: ${{ inputs.timeout }}
          opencli-json: ${{ inputs.opencli-json }}
          xmldoc: ${{ inputs.xmldoc }}
          output-dir: _inspectra-site
          extra-args: ${{ inputs.extra-args }}
          inspectra-version: ${{ inputs.inspectra-version }}
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: ${{ inputs.dotnet-quality }}

      # ── upload artifact ─────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _inspectra-site
