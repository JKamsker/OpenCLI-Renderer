# ─────────────────────────────────────────────────────────────────────
# InSpectra Generate — reusable workflow
# ─────────────────────────────────────────────────────────────────────
#
# Most users should use the action directly:
#
#   - uses: JKamsker/InSpectra@v1
#     with:
#       cli-name: mycli
#
# This reusable workflow wraps the action with checkout, tool install,
# and artifact upload for convenience.
#
# ─────────────────────────────────────────────────────────────────────

name: InSpectra Generate

on:
  workflow_call:
    inputs:
      # ── source selection / render ───────────────────────────────
      mode:
        type: string
        default: 'exec'
        description: 'exec, file, dotnet, or package; non-file modes first generate opencli.json, then render it'

      format:
        type: string
        default: 'html'
        description: 'html, markdown (tree), markdown-monolith (single file), or markdown-hybrid (README + group files as needed; leaf-only CLIs may emit README only)'

      split-depth:
        type: string
        description: 'Depth for markdown-hybrid output (default 1). Group files are emitted only when groups exist; leaf-only CLIs may emit README only. Ignored for other formats.'

      # ── target CLI (exec mode) ──────────────────────────────────
      cli-name:
        type: string
        description: 'CLI executable name or path'

      package-id:
        type: string
        description: 'NuGet package id for mode: package'

      package-version:
        type: string
        description: 'NuGet package version for mode: package'

      dotnet-tool:
        type: string
        description: 'NuGet package to `dotnet tool install -g` as the target CLI'

      dotnet-tool-version:
        type: string
        description: 'Version constraint for the dotnet tool'

      setup-command:
        type: string
        description: 'Custom shell command to make the CLI available on PATH'

      opencli-args:
        type: string
        description: 'Override OpenCLI export arguments for generate-based modes (exec, dotnet, package; default: cli opencli)'

      xmldoc-args:
        type: string
        description: 'Override xmldoc export arguments for generate-based modes (exec, dotnet, package; default: cli xmldoc)'

      timeout:
        type: string
        description: 'Timeout in seconds for each generate-mode export command (exec, dotnet, package)'

      opencli-mode:
        type: string
        description: 'OpenCLI acquisition mode: native, auto, help, clifx, static, or hook'

      command:
        type: string
        description: 'Override the generated root command name'

      cli-framework:
        type: string
        description: 'Hint or override the detected CLI framework'

      # ── file mode ────────────────────────────────────────────────
      opencli-json:
        type: string
        description: 'Path to opencli.json (file mode)'

      xmldoc:
        type: string
        description: 'Path to xmldoc.xml (file mode)'

      # ── dotnet mode ──────────────────────────────────────────────
      project:
        type: string
        description: 'Path to a .csproj/.fsproj/.vbproj (or directory containing one) for dotnet mode'

      configuration:
        type: string
        description: 'Build configuration for the dotnet acquisition step (e.g. Release)'

      framework:
        type: string
        description: 'Target framework for the dotnet acquisition step (e.g. net10.0)'

      launch-profile:
        type: string
        description: 'Launch profile for the dotnet acquisition step'

      no-build:
        type: string
        default: 'false'
        description: 'Pass --no-build to the dotnet acquisition step (use after a separate build step)'

      no-restore:
        type: string
        default: 'false'
        description: 'Pass --no-restore to the dotnet acquisition step'

      # ── inspectra tool ───────────────────────────────────────────
      inspectra-version:
        type: string
        description: 'InSpectra.Gen NuGet tool version (empty = latest)'

      inspectra-cli-package:
        type: string
        default: 'InSpectra.Cli'
        description: 'NuGet package id auto-added to the target project in dotnet mode (provides cli opencli / cli xmldoc).'

      inspectra-cli-version:
        type: string
        description: 'Version constraint for the auto-added InSpectra.Cli package (empty = latest).'

      skip-inspectra-cli:
        type: string
        default: 'false'
        description: 'Set to "true" to skip the automatic InSpectra.Cli PackageReference in dotnet mode.'

      dotnet-version:
        type: string
        default: '10.0.x'
        description: '.NET SDK version (the action also auto-detects the project TargetFramework in dotnet mode)'

      dotnet-quality:
        type: string
        description: '.NET SDK quality channel (empty = stable, or preview)'

      label:
        type: string
        description: 'Custom label shown in the viewer header (e.g. "v1.2.3")'

      title:
        type: string
        description: 'Override the CLI title shown in the viewer header and overview'

      command-prefix:
        type: string
        description: 'Override the CLI command prefix used in generated examples and the composer'

      single-file:
        type: string
        default: 'false'
        description: 'Force a single self-contained HTML file. HTML is also self-contained by default at compression-level 2.'

      compression-level:
        type: string
        default: '2'
        description: 'Compression level (0=none, 1=compress JSON, 2=self-extracting single-file bundle)'

      theme:
        type: string
        description: 'Initial theme mode (light or dark)'

      color-theme:
        type: string
        description: 'Color theme (cyan, indigo, emerald, amber, rose, blue)'

      accent:
        type: string
        description: 'Custom accent color for light mode (hex, e.g. "#7c3aed")'

      accent-dark:
        type: string
        description: 'Custom accent color for dark mode (hex, falls back to accent)'

      no-theme-picker:
        type: string
        default: 'false'
        description: 'Hide the color theme picker from the viewer toolbar'

      extra-args:
        type: string
        description: 'Additional flags forwarded to the inspectra CLI'

      # ── output ───────────────────────────────────────────────────
      output-dir:
        type: string
        default: 'inspectra-output'
        description: 'Directory where the rendered output is written'

      artifact-name:
        type: string
        default: 'inspectra-docs'
        description: 'Name of the uploaded artifact'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: ${{ inputs.dotnet-quality }}

      # ── optional: install target CLI from NuGet ─────────────────
      - name: Install target CLI (.NET tool)
        if: inputs.dotnet-tool != ''
        shell: bash
        env:
          TOOL_NAME: ${{ inputs.dotnet-tool }}
          TOOL_VERSION: ${{ inputs.dotnet-tool-version }}
        run: |
          set -euo pipefail
          args=(dotnet tool install -g "$TOOL_NAME")
          if [ -n "$TOOL_VERSION" ]; then
            args+=(--version "$TOOL_VERSION")
          fi
          "${args[@]}"

      # ── optional: custom setup ──────────────────────────────────
      - name: Run custom setup command
        if: inputs.setup-command != ''
        shell: bash
        run: ${{ inputs.setup-command }}

      # ── acquire + render ────────────────────────────────────────
      - name: Generate and render with InSpectra
        uses: JKamsker/InSpectra@v1
        with:
          mode: ${{ inputs.mode }}
          format: ${{ inputs.format }}
          split-depth: ${{ inputs.split-depth }}
          cli-name: ${{ inputs.cli-name }}
          package-id: ${{ inputs.package-id }}
          package-version: ${{ inputs.package-version }}
          label: ${{ inputs.label }}
          title: ${{ inputs.title }}
          command-prefix: ${{ inputs.command-prefix }}
          opencli-args: ${{ inputs.opencli-args }}
          xmldoc-args: ${{ inputs.xmldoc-args }}
          timeout: ${{ inputs.timeout }}
          opencli-mode: ${{ inputs.opencli-mode }}
          command: ${{ inputs.command }}
          cli-framework: ${{ inputs.cli-framework }}
          opencli-json: ${{ inputs.opencli-json }}
          xmldoc: ${{ inputs.xmldoc }}
          project: ${{ inputs.project }}
          configuration: ${{ inputs.configuration }}
          framework: ${{ inputs.framework }}
          launch-profile: ${{ inputs.launch-profile }}
          no-build: ${{ inputs.no-build }}
          no-restore: ${{ inputs.no-restore }}
          output-dir: ${{ inputs.output-dir }}
          single-file: ${{ inputs.single-file }}
          compression-level: ${{ inputs.compression-level }}
          theme: ${{ inputs.theme }}
          color-theme: ${{ inputs.color-theme }}
          accent: ${{ inputs.accent }}
          accent-dark: ${{ inputs.accent-dark }}
          no-theme-picker: ${{ inputs.no-theme-picker }}
          extra-args: ${{ inputs.extra-args }}
          inspectra-version: ${{ inputs.inspectra-version }}
          inspectra-cli-package: ${{ inputs.inspectra-cli-package }}
          inspectra-cli-version: ${{ inputs.inspectra-cli-version }}
          skip-inspectra-cli: ${{ inputs.skip-inspectra-cli }}
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: ${{ inputs.dotnet-quality }}

      # ── upload artifact ─────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.output-dir }}
