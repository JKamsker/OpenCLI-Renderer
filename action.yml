name: 'InSpectra Render'
description: 'Generate interactive CLI documentation with InSpectra'
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  mode:
    description: >
      Render mode.
        exec  - invoke a live CLI (requires cli-name)
        file  - render from a saved opencli.json (requires opencli-json)
    required: false
    default: 'exec'

  format:
    description: >
      Output format.
        html               - interactive SPA bundle
        markdown            - tree layout (one file per command)
        markdown-monolith   - single Markdown file
    required: false
    default: 'html'

  # ── exec mode ──────────────────────────────────────────────────────
  cli-name:
    description: 'CLI executable name or path (exec mode)'
    required: false

  dotnet-tool:
    description: 'NuGet package to dotnet tool install -g (exec mode, requires cli-name)'
    required: false

  dotnet-tool-version:
    description: 'Version constraint for the dotnet tool install'
    required: false

  opencli-args:
    description: 'Override the OpenCLI export arguments (exec mode, default: cli opencli)'
    required: false

  xmldoc-args:
    description: 'Override the xmldoc export arguments (exec mode, default: cli xmldoc)'
    required: false

  timeout:
    description: 'Timeout in seconds for each export command (exec mode)'
    required: false

  # ── file mode ──────────────────────────────────────────────────────
  opencli-json:
    description: 'Path to opencli.json file (file mode)'
    required: false

  xmldoc:
    description: 'Path to xmldoc.xml file (file mode)'
    required: false

  # ── common ─────────────────────────────────────────────────────────
  output-dir:
    description: 'Directory where the rendered output is written'
    required: false
    default: 'inspectra-output'

  label:
    description: 'Custom label shown in the viewer header (e.g. "v1.2.3")'
    required: false

  single-file:
    description: 'Emit a single self-contained HTML file (works from file://)'
    required: false
    default: 'false'

  compression-level:
    description: >
      Compression level for HTML output.
        0  - none (raw JSON, largest)
        1  - compress embedded JSON
        2  - self-extracting bundle (smallest, default)
    required: false
    default: '2'

  theme:
    description: 'Initial theme mode (light or dark)'
    required: false

  color-theme:
    description: 'Color theme (cyan, indigo, emerald, amber, rose, blue)'
    required: false

  accent:
    description: 'Custom accent color for light mode (hex, e.g. "#7c3aed")'
    required: false

  accent-dark:
    description: 'Custom accent color for dark mode (hex, falls back to accent)'
    required: false

  no-theme-picker:
    description: 'Hide the color theme picker from the viewer toolbar'
    required: false
    default: 'false'

  extra-args:
    description: 'Additional flags forwarded to the inspectra CLI'
    required: false

  inspectra-version:
    description: 'InSpectra.Gen NuGet tool version (empty = latest)'
    required: false

  dotnet-version:
    description: '.NET SDK version to install'
    required: false
    default: '10.0.x'

  dotnet-quality:
    description: '.NET SDK quality channel (empty = stable, or preview)'
    required: false

outputs:
  output-dir:
    description: 'Path to the rendered output directory'
    value: ${{ inputs.output-dir }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        CLI_NAME: ${{ inputs.cli-name }}
        DOTNET_TOOL: ${{ inputs.dotnet-tool }}
        OPENCLI_JSON: ${{ inputs.opencli-json }}
      run: |
        set -euo pipefail
        if [ "$MODE" = "exec" ] && [ -z "$CLI_NAME" ]; then
          echo "::error::exec mode requires cli-name"
          exit 1
        fi
        if [ -n "$DOTNET_TOOL" ] && [ -z "$CLI_NAME" ]; then
          echo "::error::dotnet-tool requires cli-name (the executable name after install)"
          exit 1
        fi
        if [ "$MODE" = "file" ] && [ -z "$OPENCLI_JSON" ]; then
          echo "::error::file mode requires opencli-json"
          exit 1
        fi
        if [ "$MODE" = "file" ] && [ -n "$DOTNET_TOOL" ]; then
          echo "::error::dotnet-tool is not used in file mode"
          exit 1
        fi

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        dotnet-quality: ${{ inputs.dotnet-quality }}

    - name: Install InSpectra
      shell: bash
      env:
        INSPECTRA_VERSION: ${{ inputs.inspectra-version }}
      run: |
        set -euo pipefail
        if [ -n "$INSPECTRA_VERSION" ]; then
          dotnet tool install -g InSpectra.Gen --version "$INSPECTRA_VERSION"
        else
          dotnet tool install -g InSpectra.Gen
        fi
        inspectra --version

    - name: Install target CLI
      if: inputs.dotnet-tool != ''
      shell: bash
      env:
        TOOL_NAME: ${{ inputs.dotnet-tool }}
        TOOL_VERSION: ${{ inputs.dotnet-tool-version }}
      run: |
        set -euo pipefail
        args=(dotnet tool install -g "$TOOL_NAME")
        if [ -n "$TOOL_VERSION" ]; then
          args+=(--version "$TOOL_VERSION")
        fi
        "${args[@]}"

    - name: Render
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        FORMAT: ${{ inputs.format }}
        CLI_NAME: ${{ inputs.cli-name }}
        OPENCLI_JSON: ${{ inputs.opencli-json }}
        XMLDOC: ${{ inputs.xmldoc }}
        OPENCLI_ARGS: ${{ inputs.opencli-args }}
        XMLDOC_ARGS: ${{ inputs.xmldoc-args }}
        TIMEOUT: ${{ inputs.timeout }}
        LABEL: ${{ inputs.label }}
        SINGLE_FILE: ${{ inputs.single-file }}
        COMPRESSION_LEVEL: ${{ inputs.compression-level }}
        THEME: ${{ inputs.theme }}
        COLOR_THEME: ${{ inputs.color-theme }}
        ACCENT: ${{ inputs.accent }}
        ACCENT_DARK: ${{ inputs.accent-dark }}
        NO_THEME_PICKER: ${{ inputs.no-theme-picker }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail

        # ── determine subcommand + format flags ──
        case "$FORMAT" in
          html)
            subcmd="html"
            format_args=(--out-dir "$OUTPUT_DIR")
            ;;
          markdown)
            subcmd="markdown"
            format_args=(--layout tree --out-dir "$OUTPUT_DIR")
            ;;
          markdown-monolith)
            subcmd="markdown"
            mkdir -p "$OUTPUT_DIR"
            format_args=(--layout single --out "$OUTPUT_DIR/README.md")
            ;;
          *)
            echo "::error::Unknown format: $FORMAT"
            exit 1
            ;;
        esac

        # ── build command based on mode ──
        if [ "$MODE" = "exec" ]; then
          args=(render exec "$subcmd" "$CLI_NAME" --overwrite)

          # auto-detect xmldoc support
          xmldoc_probe=( ${XMLDOC_ARGS:-cli xmldoc} )
          if "$CLI_NAME" "${xmldoc_probe[@]}" > /dev/null 2>&1; then
            echo "xmldoc supported — enriching output"
            args+=(--with-xmldoc)
            if [ -n "$XMLDOC_ARGS" ]; then
              for a in $XMLDOC_ARGS; do args+=(--xmldoc-arg "$a"); done
            fi
          else
            echo "xmldoc not available — rendering without enrichment"
          fi

          if [ -n "$OPENCLI_ARGS" ]; then
            for a in $OPENCLI_ARGS; do args+=(--opencli-arg "$a"); done
          fi

          if [ -n "$TIMEOUT" ]; then
            args+=(--timeout "$TIMEOUT")
          fi

        elif [ "$MODE" = "file" ]; then
          args=(render file "$subcmd" "$OPENCLI_JSON" --overwrite)
          if [ -n "$XMLDOC" ]; then
            args+=(--xmldoc "$XMLDOC")
          fi
        else
          echo "::error::Unknown mode: $MODE"
          exit 1
        fi

        args+=("${format_args[@]}")

        if [ -n "$LABEL" ]; then
          args+=(--label "$LABEL")
        fi

        # ── HTML-specific options ──
        if [ "$subcmd" = "html" ]; then
          if [ "$SINGLE_FILE" = "true" ]; then
            args+=(--single-file)
          fi
          args+=(--compression-level "$COMPRESSION_LEVEL")
          if [ -n "${THEME:-}" ]; then
            args+=(--theme "$THEME")
          fi
          if [ -n "${COLOR_THEME:-}" ]; then
            args+=(--color-theme "$COLOR_THEME")
          fi
          if [ -n "${ACCENT:-}" ]; then
            args+=(--accent "$ACCENT")
          fi
          if [ -n "${ACCENT_DARK:-}" ]; then
            args+=(--accent-dark "$ACCENT_DARK")
          fi
          if [ "$NO_THEME_PICKER" = "true" ]; then
            args+=(--no-theme-picker)
          fi
        fi

        if [ -n "${EXTRA_ARGS:-}" ]; then
          # shellcheck disable=SC2206
          args+=($EXTRA_ARGS)
        fi

        echo "::group::inspectra ${args[*]}"
        inspectra "${args[@]}"
        echo "::endgroup::"

    - name: Verify output
      shell: bash
      env:
        FORMAT: ${{ inputs.format }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -euo pipefail
        case "$FORMAT" in
          html)
            test -f "$OUTPUT_DIR/index.html"
            ;;
          markdown)
            test -d "$OUTPUT_DIR"
            found=$(find "$OUTPUT_DIR" -name '*.md' | head -1)
            test -n "$found"
            ;;
          markdown-monolith)
            test -f "$OUTPUT_DIR/README.md"
            ;;
        esac
        echo "InSpectra output verified ($FORMAT) at $OUTPUT_DIR"
