name: 'InSpectra Render'
description: 'Generate interactive CLI documentation with InSpectra'
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  mode:
    description: >
      Render mode.
        exec    - invoke a live CLI (requires cli-name)
        file    - render from a saved opencli.json (requires opencli-json)
        dotnet  - run a .NET project from source (requires project)
    required: false
    default: 'exec'

  format:
    description: >
      Output format.
        html               - interactive SPA bundle
        markdown            - tree layout (one file per command)
        markdown-monolith   - single Markdown file
        markdown-hybrid     - README.md + one file per command group (see split-depth)
    required: false
    default: 'html'

  split-depth:
    description: >
      Depth for markdown-hybrid output (default 1). Depth 1 emits one file per top-level group;
      depth 2 also emits a file per second-level group; and so on. Ignored for other formats.
    required: false

  # ── exec mode ──────────────────────────────────────────────────────
  cli-name:
    description: 'CLI executable name or path (exec mode)'
    required: false

  dotnet-tool:
    description: 'NuGet package to dotnet tool install -g (exec mode, requires cli-name)'
    required: false

  dotnet-tool-version:
    description: 'Version constraint for the dotnet tool install'
    required: false

  opencli-args:
    description: 'Override the OpenCLI export arguments (exec mode, default: cli opencli)'
    required: false

  xmldoc-args:
    description: 'Override the xmldoc export arguments (exec mode, default: cli xmldoc)'
    required: false

  timeout:
    description: 'Timeout in seconds for each export command (exec mode)'
    required: false

  # ── file mode ──────────────────────────────────────────────────────
  opencli-json:
    description: 'Path to opencli.json file (file mode)'
    required: false

  xmldoc:
    description: 'Path to xmldoc.xml file (file mode)'
    required: false

  # ── dotnet mode ────────────────────────────────────────────────────
  project:
    description: 'Path to a .csproj/.fsproj/.vbproj (or directory containing one) for `mode: dotnet`'
    required: false

  configuration:
    description: 'Build configuration for `dotnet run` (e.g. Release)'
    required: false

  framework:
    description: 'Target framework for `dotnet run` (e.g. net10.0)'
    required: false

  launch-profile:
    description: 'Launch profile for `dotnet run`'
    required: false

  no-build:
    description: 'Pass --no-build to `dotnet run` (use after a separate build step)'
    required: false
    default: 'false'

  no-restore:
    description: 'Pass --no-restore to `dotnet run`'
    required: false
    default: 'false'

  # ── common ─────────────────────────────────────────────────────────
  output-dir:
    description: 'Directory where the rendered output is written'
    required: false
    default: 'inspectra-output'

  label:
    description: 'Custom label shown in the viewer header (e.g. "v1.2.3")'
    required: false

  single-file:
    description: 'Emit a single self-contained HTML file (works from file://)'
    required: false
    default: 'false'

  compression-level:
    description: >
      Compression level for HTML output.
        0  - none (raw JSON, largest)
        1  - compress embedded JSON
        2  - self-extracting bundle (smallest, default)
    required: false
    default: '2'

  theme:
    description: 'Initial theme mode (light or dark)'
    required: false

  color-theme:
    description: 'Color theme (cyan, indigo, emerald, amber, rose, blue)'
    required: false

  accent:
    description: 'Custom accent color for light mode (hex, e.g. "#7c3aed")'
    required: false

  accent-dark:
    description: 'Custom accent color for dark mode (hex, falls back to accent)'
    required: false

  no-theme-picker:
    description: 'Hide the color theme picker from the viewer toolbar'
    required: false
    default: 'false'

  extra-args:
    description: 'Additional flags forwarded to the inspectra CLI'
    required: false

  inspectra-version:
    description: 'InSpectra.Gen NuGet tool version (empty = latest)'
    required: false

  inspectra-cli-package:
    description: 'NuGet package id auto-added to the target project in dotnet mode (provides cli opencli / cli xmldoc).'
    required: false
    default: 'InSpectra.Cli'

  inspectra-cli-version:
    description: 'Version constraint for the auto-added InSpectra.Cli package (empty = latest).'
    required: false

  skip-inspectra-cli:
    description: 'Set to "true" to skip the automatic InSpectra.Cli PackageReference in dotnet mode (e.g. when the project already manages it).'
    required: false
    default: 'false'

  dotnet-version:
    description: >
      .NET SDK version(s) required by InSpectra (default 10.0.x). In dotnet mode the action also
      auto-adds the version derived from the project's TargetFramework.
    required: false
    default: '10.0.x'

  dotnet-quality:
    description: '.NET SDK quality channel (empty = stable, or preview)'
    required: false

outputs:
  output-dir:
    description: 'Path to the rendered output directory'
    value: ${{ inputs.output-dir }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        CLI_NAME: ${{ inputs.cli-name }}
        DOTNET_TOOL: ${{ inputs.dotnet-tool }}
        OPENCLI_JSON: ${{ inputs.opencli-json }}
        PROJECT: ${{ inputs.project }}
      run: |
        set -euo pipefail
        if [ "$MODE" = "exec" ] && [ -z "$CLI_NAME" ]; then
          echo "::error::exec mode requires cli-name"
          exit 1
        fi
        if [ -n "$DOTNET_TOOL" ] && [ -z "$CLI_NAME" ]; then
          echo "::error::dotnet-tool requires cli-name (the executable name after install)"
          exit 1
        fi
        if [ "$MODE" = "file" ] && [ -z "$OPENCLI_JSON" ]; then
          echo "::error::file mode requires opencli-json"
          exit 1
        fi
        if [ "$MODE" = "file" ] && [ -n "$DOTNET_TOOL" ]; then
          echo "::error::dotnet-tool is not used in file mode"
          exit 1
        fi
        if [ "$MODE" = "dotnet" ] && [ -z "$PROJECT" ]; then
          echo "::error::dotnet mode requires project"
          exit 1
        fi
        if [ "$MODE" = "dotnet" ] && [ -n "$DOTNET_TOOL" ]; then
          echo "::error::dotnet-tool is not used in dotnet mode (the project is built from source)"
          exit 1
        fi

    - name: Resolve required .NET SDKs
      id: dotnet-needs
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        PROJECT: ${{ inputs.project }}
        INPUT_VERSION: ${{ inputs.dotnet-version }}
      run: |
        set -euo pipefail

        # 1. Versions InSpectra itself needs (defaults to 10.0.x).
        declare -A want
        for v in ${INPUT_VERSION:-10.0.x}; do
          want["$v"]=1
        done

        # 2. In dotnet mode, also include SDKs derived from the project's TargetFramework(s).
        if [ "$MODE" = "dotnet" ] && [ -n "$PROJECT" ]; then
          csproj="$PROJECT"
          if [ -d "$csproj" ]; then
            csproj=$(find "$PROJECT" -maxdepth 1 \( -name '*.csproj' -o -name '*.fsproj' -o -name '*.vbproj' \) -print -quit || true)
          fi
          if [ -n "$csproj" ] && [ -f "$csproj" ]; then
            tfms=$(sed -nE 's|.*<TargetFrameworks?>([^<]+)</TargetFrameworks?>.*|\1|p' "$csproj" | tr ';' ' ')
            for tfm in $tfms; do
              if [[ "$tfm" =~ ^net([0-9]+\.[0-9]+)$ ]]; then
                want["${BASH_REMATCH[1]}.x"]=1
              fi
            done
          fi
        fi

        # 3. Subtract versions that are already installed.
        installed=""
        if command -v dotnet >/dev/null 2>&1; then
          installed=$(dotnet --list-sdks 2>/dev/null | awk '{print $1}' || true)
        fi

        needed=()
        for v in "${!want[@]}"; do
          mm="${v%.x}"
          esc="${mm//./\\.}"
          if printf '%s\n' "$installed" | grep -qE "^${esc}\."; then
            echo "Already installed: $mm"
          else
            needed+=("$v")
          fi
        done

        if [ "${#needed[@]}" -eq 0 ]; then
          echo "All required .NET SDKs already installed."
          echo "install=false" >> "$GITHUB_OUTPUT"
          echo "versions=" >> "$GITHUB_OUTPUT"
        else
          echo "Will install: ${needed[*]}"
          echo "install=true" >> "$GITHUB_OUTPUT"
          {
            echo 'versions<<EOF'
            printf '%s\n' "${needed[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Setup .NET
      if: steps.dotnet-needs.outputs.install == 'true'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ steps.dotnet-needs.outputs.versions }}
        dotnet-quality: ${{ inputs.dotnet-quality }}

    - name: Install InSpectra
      shell: bash
      env:
        INSPECTRA_VERSION: ${{ inputs.inspectra-version }}
      run: |
        set -euo pipefail
        if command -v inspectra >/dev/null 2>&1; then
          echo "inspectra already on PATH: $(inspectra --version)"
          exit 0
        fi
        if [ -n "$INSPECTRA_VERSION" ]; then
          dotnet tool install -g InSpectra.Gen --version "$INSPECTRA_VERSION"
        else
          dotnet tool install -g InSpectra.Gen
        fi
        inspectra --version

    - name: Auto-add InSpectra.Cli to target project
      if: inputs.mode == 'dotnet' && inputs.skip-inspectra-cli != 'true'
      shell: bash
      env:
        PROJECT: ${{ inputs.project }}
        PACKAGE: ${{ inputs.inspectra-cli-package }}
        PACKAGE_VERSION: ${{ inputs.inspectra-cli-version }}
      run: |
        set -euo pipefail

        pkg="${PACKAGE:-InSpectra.Cli}"

        # `dotnet add package` needs a project file, not a directory — resolve if needed.
        csproj="$PROJECT"
        if [ -d "$csproj" ]; then
          csproj=$(find "$PROJECT" -maxdepth 1 \( -name '*.csproj' -o -name '*.fsproj' -o -name '*.vbproj' \) -print -quit || true)
        fi
        if [ -z "$csproj" ] || [ ! -f "$csproj" ]; then
          echo "::error::Could not resolve a .NET project at '$PROJECT' for InSpectra.Cli auto-install"
          exit 1
        fi

        # Skip if already referenced (keeps the user's pinned version intact).
        if grep -qE "<PackageReference[^>]*Include=\"${pkg}\"" "$csproj"; then
          echo "$pkg is already referenced by $csproj — skipping auto-install."
          exit 0
        fi

        args=(dotnet add "$csproj" package "$pkg")
        if [ -n "$PACKAGE_VERSION" ]; then
          args+=(--version "$PACKAGE_VERSION")
        fi
        echo "::group::${args[*]}"
        "${args[@]}"
        echo "::endgroup::"

    - name: Install target CLI
      if: inputs.dotnet-tool != ''
      shell: bash
      env:
        TOOL_NAME: ${{ inputs.dotnet-tool }}
        TOOL_VERSION: ${{ inputs.dotnet-tool-version }}
      run: |
        set -euo pipefail
        args=(dotnet tool install -g "$TOOL_NAME")
        if [ -n "$TOOL_VERSION" ]; then
          args+=(--version "$TOOL_VERSION")
        fi
        "${args[@]}"

    - name: Render
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        FORMAT: ${{ inputs.format }}
        SPLIT_DEPTH: ${{ inputs.split-depth }}
        CLI_NAME: ${{ inputs.cli-name }}
        OPENCLI_JSON: ${{ inputs.opencli-json }}
        XMLDOC: ${{ inputs.xmldoc }}
        OPENCLI_ARGS: ${{ inputs.opencli-args }}
        XMLDOC_ARGS: ${{ inputs.xmldoc-args }}
        TIMEOUT: ${{ inputs.timeout }}
        LABEL: ${{ inputs.label }}
        SINGLE_FILE: ${{ inputs.single-file }}
        COMPRESSION_LEVEL: ${{ inputs.compression-level }}
        THEME: ${{ inputs.theme }}
        COLOR_THEME: ${{ inputs.color-theme }}
        ACCENT: ${{ inputs.accent }}
        ACCENT_DARK: ${{ inputs.accent-dark }}
        NO_THEME_PICKER: ${{ inputs.no-theme-picker }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
        PROJECT: ${{ inputs.project }}
        CONFIGURATION: ${{ inputs.configuration }}
        FRAMEWORK: ${{ inputs.framework }}
        LAUNCH_PROFILE: ${{ inputs.launch-profile }}
        NO_BUILD: ${{ inputs.no-build }}
        NO_RESTORE: ${{ inputs.no-restore }}
      run: |
        set -euo pipefail

        # ── determine subcommand + format flags ──
        case "$FORMAT" in
          html)
            subcmd="html"
            format_args=(--out-dir "$OUTPUT_DIR")
            ;;
          markdown)
            subcmd="markdown"
            format_args=(--layout tree --out-dir "$OUTPUT_DIR")
            ;;
          markdown-monolith)
            subcmd="markdown"
            mkdir -p "$OUTPUT_DIR"
            format_args=(--layout single --out "$OUTPUT_DIR/README.md")
            ;;
          markdown-hybrid)
            subcmd="markdown"
            format_args=(--layout hybrid --out-dir "$OUTPUT_DIR")
            if [ -n "${SPLIT_DEPTH:-}" ]; then
              format_args+=(--split-depth "$SPLIT_DEPTH")
            fi
            ;;
          *)
            echo "::error::Unknown format: $FORMAT"
            exit 1
            ;;
        esac

        if [ -n "${SPLIT_DEPTH:-}" ] && [ "$FORMAT" != "markdown-hybrid" ]; then
          echo "::warning::split-depth is ignored for format '$FORMAT'; it only applies to markdown-hybrid."
        fi

        # ── build command based on mode ──
        if [ "$MODE" = "exec" ]; then
          args=(render exec "$subcmd" "$CLI_NAME" --overwrite)

          # auto-detect xmldoc support
          xmldoc_probe=( ${XMLDOC_ARGS:-cli xmldoc} )
          if "$CLI_NAME" "${xmldoc_probe[@]}" > /dev/null 2>&1; then
            echo "xmldoc supported — enriching output"
            args+=(--with-xmldoc)
            if [ -n "$XMLDOC_ARGS" ]; then
              for a in $XMLDOC_ARGS; do args+=(--xmldoc-arg "$a"); done
            fi
          else
            echo "xmldoc not available — rendering without enrichment"
          fi

          if [ -n "$OPENCLI_ARGS" ]; then
            for a in $OPENCLI_ARGS; do args+=(--opencli-arg "$a"); done
          fi

          if [ -n "$TIMEOUT" ]; then
            args+=(--timeout "$TIMEOUT")
          fi

        elif [ "$MODE" = "file" ]; then
          args=(render file "$subcmd" "$OPENCLI_JSON" --overwrite)
          if [ -n "$XMLDOC" ]; then
            args+=(--xmldoc "$XMLDOC")
          fi

        elif [ "$MODE" = "dotnet" ]; then
          args=(render dotnet "$subcmd" "$PROJECT" --overwrite)

          [ -n "$CONFIGURATION" ]   && args+=(--configuration "$CONFIGURATION")
          [ -n "$FRAMEWORK" ]       && args+=(--framework "$FRAMEWORK")
          [ -n "$LAUNCH_PROFILE" ]  && args+=(--launch-profile "$LAUNCH_PROFILE")
          [ "$NO_BUILD" = "true" ]  && args+=(--no-build)
          [ "$NO_RESTORE" = "true" ] && args+=(--no-restore)

          # auto-detect xmldoc support by probing the project once
          # (subsequent dotnet run invocations reuse the same build output)
          probe_args=(run --project "$PROJECT")
          [ -n "$CONFIGURATION" ]   && probe_args+=(-c "$CONFIGURATION")
          [ -n "$FRAMEWORK" ]       && probe_args+=(-f "$FRAMEWORK")
          [ "$NO_BUILD" = "true" ]  && probe_args+=(--no-build)
          [ "$NO_RESTORE" = "true" ] && probe_args+=(--no-restore)
          probe_args+=(--)
          xmldoc_probe=( ${XMLDOC_ARGS:-cli xmldoc} )
          if dotnet "${probe_args[@]}" "${xmldoc_probe[@]}" > /dev/null 2>&1; then
            echo "xmldoc supported — enriching output"
            args+=(--with-xmldoc)
            if [ -n "$XMLDOC_ARGS" ]; then
              for a in $XMLDOC_ARGS; do args+=(--xmldoc-arg "$a"); done
            fi
          else
            echo "xmldoc not available — rendering without enrichment"
          fi

          if [ -n "$OPENCLI_ARGS" ]; then
            for a in $OPENCLI_ARGS; do args+=(--opencli-arg "$a"); done
          fi

          if [ -n "$TIMEOUT" ]; then
            args+=(--timeout "$TIMEOUT")
          fi

        else
          echo "::error::Unknown mode: $MODE"
          exit 1
        fi

        args+=("${format_args[@]}")

        if [ -n "$LABEL" ]; then
          args+=(--label "$LABEL")
        fi

        # ── HTML-specific options ──
        if [ "$subcmd" = "html" ]; then
          if [ "$SINGLE_FILE" = "true" ]; then
            args+=(--single-file)
          fi
          args+=(--compression-level "$COMPRESSION_LEVEL")
          if [ -n "${THEME:-}" ]; then
            args+=(--theme "$THEME")
          fi
          if [ -n "${COLOR_THEME:-}" ]; then
            args+=(--color-theme "$COLOR_THEME")
          fi
          if [ -n "${ACCENT:-}" ]; then
            args+=(--accent "$ACCENT")
          fi
          if [ -n "${ACCENT_DARK:-}" ]; then
            args+=(--accent-dark "$ACCENT_DARK")
          fi
          if [ "$NO_THEME_PICKER" = "true" ]; then
            args+=(--no-theme-picker)
          fi
        fi

        if [ -n "${EXTRA_ARGS:-}" ]; then
          # shellcheck disable=SC2206
          args+=($EXTRA_ARGS)
        fi

        echo "::group::inspectra ${args[*]}"
        inspectra "${args[@]}"
        echo "::endgroup::"

    - name: Verify output
      shell: bash
      env:
        FORMAT: ${{ inputs.format }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -euo pipefail
        case "$FORMAT" in
          html)
            test -f "$OUTPUT_DIR/index.html"
            ;;
          markdown)
            test -d "$OUTPUT_DIR"
            found=$(find "$OUTPUT_DIR" -name '*.md' | head -1)
            test -n "$found"
            ;;
          markdown-monolith)
            test -f "$OUTPUT_DIR/README.md"
            ;;
          markdown-hybrid)
            test -f "$OUTPUT_DIR/README.md"
            # Hybrid always emits the README plus at least one group file.
            group_count=$(find "$OUTPUT_DIR" -mindepth 2 -name 'index.md' | wc -l)
            if [ "$group_count" -eq 0 ]; then
              echo "::error::markdown-hybrid output is missing per-group index.md files"
              exit 1
            fi
            ;;
        esac
        echo "InSpectra output verified ($FORMAT) at $OUTPUT_DIR"
