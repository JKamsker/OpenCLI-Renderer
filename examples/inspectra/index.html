red=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude commands and options marked hidden by the \nsource CLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022include-metadata\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022\nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude metadata sections in the rendered Markdown or \nHTML output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022json\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 Kind=\u0022flag\u0022\nClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EEmit the stable machine-readable JSON envelope instead \nof human output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022label\u0022 Value=\u0022TEXT\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003ECustom label shown in the viewer header (e.g. a version\nstring).\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-color\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable ANSI color sequences in human-readable console \noutput.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-composer\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EHide the interactive command composer from the \ngenerated HTML app.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-dark\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable dark mode in the generated HTML \napp.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-light\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable light mode in the generated HTML \napp.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022out-dir\u0022 Value=\u0022DIR\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EDirectory where the HTML app bundle should be \nwritten.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022output\u0022 Value=\u0022MODE\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EOverride the output mode. Supported values are human \nand json.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022overwrite\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EAllow existing output files or directories to be \nreplaced.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022q\u0022 Long=\u0022quiet\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003ESuppress non-essential console output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022show-home\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EShow the viewer home screen button in the generated \nHTML app.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022verbose\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EIncrease diagnostic detail in the rendered summary \noutput.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022xmldoc\u0022 Value=\u0022PATH\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EOptional XML documentation file used to enrich missing \ndescriptions.\u003C/Description\u003E\n          \u003C/Option\u003E\n        \u003C/Parameters\u003E\n      \u003C/Command\u003E\n    \u003C/Command\u003E\n    \u003C!--EXEC--\u003E\n    \u003CCommand Name=\u0022exec\u0022 IsBranch=\u0022true\u0022 \nSettings=\u0022Spectre.Console.Cli.CommandSettings\u0022\u003E\n      \u003CDescription\u003ERender docs by executing a CLI that exposes \u0060cli \nopencli\u0060.\u003C/Description\u003E\n      \u003C!--MARKDOWN--\u003E\n      \u003CCommand Name=\u0022markdown\u0022 IsBranch=\u0022false\u0022 \nClrType=\u0022InSpectra.Gen.Commands.Render.ExecMarkdownCommand\u0022 \nSettings=\u0022InSpectra.Gen.Commands.Render.ExecRenderSettings\u0022\u003E\n        \u003CDescription\u003ERender Markdown from a live CLI process and optional \u0060cli \nxmldoc\u0060 enrichment.\u003C/Description\u003E\n        \u003CParameters\u003E\n          \u003CArgument Name=\u0022SOURCE\u0022 Position=\u00220\u0022 Required=\u0022true\u0022 Kind=\u0022scalar\u0022 \nClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003ECLI executable or script to invoke for cli opencli \nexports.\u003C/Description\u003E\n          \u003C/Argument\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022cwd\u0022 Value=\u0022PATH\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EWorking directory to use when invoking the source \nCLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022dry-run\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EPreview the resolved render plan without writing \nfiles.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022include-hidden\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude commands and options marked hidden by the \nsource CLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022include-metadata\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022\nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude metadata sections in the rendered Markdown or \nHTML output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022json\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 Kind=\u0022flag\u0022\nClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EEmit the stable machine-readable JSON envelope instead \nof human output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022layout\u0022 Value=\u0022LAYOUT\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EMarkdow 3E\n            \u003CDescription\u003EAllow existing output files or directories to be \nreplaced.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022q\u0022 Long=\u0022quiet\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003ESuppress non-essential console output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022source-arg\u0022 Value=\u0022ARG\u0022 Required=\u0022false\u0022 \nKind=\u0022vector\u0022 ClrType=\u0022System.String[]\u0022\u003E\n            \u003CDescription\u003EAdditional arguments passed directly to the source \nexecutable before the export command.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022timeout\u0022 Value=\u0022SECONDS\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.Nullable\u00601[[System.Int32, System.Private.CoreLib, \nVersion=10.0.0.0, Culture=neutral, PublicKeyToken=7cec85d7bea7798e]]\u0022\u003E\n            \u003CDescription\u003ETimeout in seconds for each export command executed \nagainst the source CLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022verbose\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EIncrease diagnostic detail in the rendered summary \noutput.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022with-xmldoc\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EAlso invoke the source CLI\u0027s cli xmldoc command for XML\nenrichment.\u003C/Description\u003E\n          \u003C/Option\u003E\n  ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EEnable the NuGet package browser on the viewer home \nscreen.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022enable-package-upload\u0022 Value=\u0022NULL\u0022 \nRequired=\u0022false\u0022 Kind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EEnable local package upload on the viewer home \nscreen.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022enable-url\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EAllow the viewer to load OpenCLI inputs from URL query \nparameters.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022include-hidden\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude commands and options marked hidden by the \nsource CLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022include-metadata\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022\nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EInclude metadata sections in the rendered Markdown or \nHTML output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022json\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 Kind=\u0022flag\u0022\nClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EEmit the stable machine-readable JSON envelope instead \nof human output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022label\u0022 Value=\u0022TEXT\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003ECustom label shown in the viewer header (e.g. a version\nstring).\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-color\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable ANSI color sequences in human-readable console \noutput.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-composer\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EHide the interactive command composer from the \ngenerated HTML app.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-dark\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable dark mode in the generated HTML \napp.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022no-light\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EDisable light mode in the generated HTML \napp.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022opencli-arg\u0022 Value=\u0022ARG\u0022 Required=\u0022false\u0022 \nKind=\u0022vector\u0022 ClrType=\u0022System.String[]\u0022\u003E\n            \u003CDescription\u003EOverride the arguments used to invoke the source CLI\u0027s \nOpenCLI export command.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022out-dir\u0022 Value=\u0022DIR\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EDirectory where the HTML app bundle should be \nwritten.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022output\u0022 Value=\u0022MODE\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n            \u003CDescription\u003EOverride the output mode. Supported values are human \nand json.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022overwrite\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EAllow existing output files or directories to be \nreplaced.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022q\u0022 Long=\u0022quiet\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003ESuppress non-essential console output.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022show-home\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EShow the viewer home screen button in the generated \nHTML app.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022source-arg\u0022 Value=\u0022ARG\u0022 Required=\u0022false\u0022 \nKind=\u0022vector\u0022 ClrType=\u0022System.String[]\u0022\u003E\n            \u003CDescription\u003EAdditional arguments passed directly to the source \nexecutable before the export command.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022timeout\u0022 Value=\u0022SECONDS\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.Nullable\u00601[[System.Int32, System.Private.CoreLib, \nVersion=10.0.0.0, Culture=neutral, PublicKeyToken=7cec85d7bea7798e]]\u0022\u003E\n            \u003CDescription\u003ETimeout in seconds for each export command executed \nagainst the source CLI.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022verbose\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EIncrease diagnostic detail in the rendered summary \noutput.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022with-xmldoc\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n            \u003CDescription\u003EAlso invoke the source CLI\u0027s cli xmldoc command for XML\nenrichment.\u003C/Description\u003E\n          \u003C/Option\u003E\n          \u003COption Short=\u0022\u0022 Long=\u0022xmldoc-arg\u0022 Value=\u0022ARG\u0022 Required=\u0022false\u0022 \nKind=\u0022vector\u0022 ClrType=\u0022System.String[]\u0022\u003E\n            \u003CDescription\u003EOverride the arguments used to invoke the source CLI\u0027s \nXML documentation export command.\u003C/Description\u003E\n          \u003C/Option\u003E\n        \u003C/Parameters\u003E\n      \u003C/Command\u003E\n    \u003C/Command\u003E\n    \u003C!--SELF--\u003E\n    \u003CCommand Name=\u0022self\u0022 IsBranch=\u0022false\u0022 \nClrType=\u0022InSpectra.Gen.Commands.Render.SelfDocCommand\u0022 \nSettings=\u0022InSpectra.Gen.Commands.Render.SelfDocSettings\u0022\u003E\n      \u003CDescription\u003ERender documentation for InSpectra itself. Exports \nopencli.json, xmldoc.xml, Markdown tree, and HTML bundle.\u003C/Description\u003E\n      \u003CParameters\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022enable-nuget-browser\u0022 Value=\u0022NULL\u0022 \nRequired=\u0022false\u0022 Kind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EEnable the NuGet package browser on the \nself-documentation viewer home screen.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022enable-package-upload\u0022 Value=\u0022NULL\u0022 \nRequired=\u0022false\u0022 Kind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EEnable local package upload on the self-documentation \nviewer home screen.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022enable-url\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EAllow the viewer to load alternate OpenCLI inputs from \nURL query parameters.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022include-hidden\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EInclude hidden commands and options from InSpectra\u0027s own \nCLI surface.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022include-metadata\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EInclude metadata sections in the generated Markdown tree \nand HTML bundle.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022label\u0022 Value=\u0022TEXT\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n          \u003CDescription\u003ECustom label shown in the viewer header (e.g. a version \nstring).\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022no-composer\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EHide the interactive command composer from the generated \nself-documentation app.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022no-dark\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EDisable dark mode in the generated self-documentation \napp.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022no-light\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EDisable light mode in the generated self-documentation \napp.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022out-dir\u0022 Value=\u0022DIR\u0022 Required=\u0022false\u0022 \nKind=\u0022scalar\u0022 ClrType=\u0022System.String\u0022\u003E\n          \u003CDescription\u003EDirectory where the self-documentation bundle should be \nwritten.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022overwrite\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EAllow existing self-documentation output to be \nreplaced.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022show-home\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003EShow the viewer home screen button in the generated \nself-documentation app.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022skip-html\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003ESkip generating the HTML app bundle under \nhtml/.\u003C/Description\u003E\n        \u003C/Option\u003E\n        \u003COption Short=\u0022\u0022 Long=\u0022skip-markdown\u0022 Value=\u0022NULL\u0022 Required=\u0022false\u0022 \nKind=\u0022flag\u0022 ClrType=\u0022System.Boolean\u0022\u003E\n          \u003CDescription\u003ESkip generating the Markdown tree output under \ntree/.\u003C/Description\u003E\n        \u003C/Option\u003E\n      \u003C/Parameters\u003E\n    \u003C/Command\u003E\n  \u003C/Command\u003E\n\u003C/Model\u003E",
  "options": {
    "includeHidden": false,

  },
  "features": {
